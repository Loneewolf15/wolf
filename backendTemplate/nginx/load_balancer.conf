# ============================================
# NGINX Load Balancer Configuration
# ============================================
# Production-ready load balancing for TraversyMVC API
# 
# Installation:
# 1. sudo cp this file to /etc/nginx/sites-available/api_loadbalancer
# 2. sudo ln -s /etc/nginx/sites-available/api_loadbalancer /etc/nginx/sites-enabled/
# 3. sudo nginx -t (test configuration)
# 4. sudo systemctl reload nginx
# ============================================

# Define upstream backend servers (your PHP application instances)
upstream backend_servers {
    # Load balancing method
    # least_conn = Route to server with fewest connections (recommended for variable request times)
    least_conn;
    
    # Alternative methods:
    # (default) = round-robin distribution
    # ip_hash = sticky sessions based on client IP (not needed with JWT)
    
    # Backend server instances
    # Add more servers for horizontal scaling
    server 127.0.0.1:8080 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;
    
    # Health check configuration (requires nginx_upstream_check_module)
    # check interval=3000 rise=2 fall=3 timeout=1000 type=http;
    # check_http_send "GET /v1/users/health HTTP/1.0\r\n\r\n";
    # check_http_expect_alive http_2xx http_3xx;
    
    # Keepalive connections for better performance
    keepalive 32;
}

# Rate limiting zones (NGINX layer - additional protection)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=register_limit:10m rate=5r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Main server block
server {
    listen 80;
    server_name api.yourdomain.com;  # Replace with your domain
    
    # Logging
    access_log /var/log/nginx/api_access.log combined;
    error_log /var/log/nginx/api_error.log warn;
    
    # Client settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Apply global rate limit
    limit_req zone=api_limit burst=200 nodelay;
    limit_conn conn_limit 20;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # API v1 endpoints (versioned)
    location /v1/ {
        proxy_pass http://backend_servers;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Health check and failover
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        
        # HTTP version for keepalive
        proxy_http_version 1.1;
    }
    
    # API v2 endpoints (future)
    location /v2/ {
        proxy_pass http://backend_servers;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Same configuration as v1
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_http_version 1.1;
    }
    
    # Login endpoint - stricter rate limit
    location ~* ^/v1/users/loginfunc$ {
        limit_req zone=login_limit burst=5 nodelay;
        
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
    }
    
    # Register endpoint - very strict rate limit
    location ~* ^/v1/users/registeruser$ {
        limit_req zone=register_limit burst=2 nodelay;
        
        proxy_pass http://backend_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
    }
    
    # Health check endpoint (bypass load balancer for direct check)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # NGINX status page (for monitoring)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;  # Only allow from localhost
        deny all;
    }
    
    # Unversioned API endpoints (legacy support - redirect to v1)
    location / {
        # Redirect to v1
        rewrite ^/(.*)$ /v1/$1 permanent;
    }
}

