name: Wolf CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install LLVM Dependencies
        run: sudo apt-get update && sudo apt-get install -y clang llvm

      - name: Install dependencies
        run: go mod download

      - name: Format
        run: if [ -n "$(gofmt -l .)" ]; then echo "Go code is not formatted"; exit 1; fi

      - name: Build
        run: make build

      - name: Test
        run: |
          make test-cover > test_log.txt 2>&1 || (
            echo "::error title=make test-cover failed::See step summary for details"
            echo "### 🔴 Test Suite Failure Log" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Click to expand full log</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -n 100 test_log.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            cat test_log.txt
            exit 2
          )

      - name: Cross-Platform Build
        run: make build-all
